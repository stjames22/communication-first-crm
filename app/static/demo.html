<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=/crm/workspace" />
  <title>Communication First CRM</title>
  <style>
    :root {
      --bg: #eef3f0;
      --panel: #ffffff;
      --ink: #1d252b;
      --muted: #66727b;
      --line: #d6ded8;
      --brand: #1f6f7a;
      --brand-dark: #174f57;
      --shadow: 0 14px 32px rgba(31, 79, 87, 0.1);
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(232, 240, 255, 0.42), rgba(248, 250, 247, 0.92) 38%),
        var(--bg);
      font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
    }

    .panel {
      width: min(100%, 560px);
      display: grid;
      gap: 16px;
      padding: 34px 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .eyebrow {
      color: var(--brand);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1, p { margin: 0; }
    h1 { font-size: 1.8rem; }
    p {
      color: var(--muted);
      line-height: 1.45;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      border-radius: 10px;
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }

    a:hover { background: var(--brand-dark); }
  </style>
</head>
<body>
  <section class="panel">
    <p class="eyebrow">Communication First CRM</p>
    <h1>Opening Communication Hub</h1>
    <p>The demo now uses the same inbox workspace as the running tool.</p>
    <a href="/crm/workspace">Open Inbox</a>
  </section>
</body>
</html>
