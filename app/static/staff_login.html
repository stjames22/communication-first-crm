<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BarkBoys Staff Login</title>
  <style>
    :root {
      --bg: #eff5f0;
      --card: #ffffff;
      --ink: #14241b;
      --muted: #58665f;
      --line: #d7e2db;
      --brand: #1d6a3a;
      --brand-dark: #15522d;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(29, 106, 58, 0.12), transparent 30%),
        linear-gradient(180deg, #f7faf7 0%, var(--bg) 100%);
    }

    .panel {
      width: min(100%, 440px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 18px 40px rgba(20, 36, 27, 0.08);
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
    }

    input, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 12px 13px;
      font-size: 1rem;
      font-family: inherit;
    }

    button {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: var(--brand-dark);
    }

    .status {
      min-height: 20px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .links a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="panel">
    <span class="eyebrow">Staff Access</span>
    <h1>BarkBoys Sales Login</h1>
    <p>Use the staff credentials from the demo startup Terminal window. The username is usually <strong>{{ESTIMATOR_USER}}</strong>.</p>

    <form id="login-form">
      <label>
        Username
        <input id="username" name="username" value="{{ESTIMATOR_USER}}" autocomplete="username" />
      </label>
      <label>
        Password
        <input id="password" name="password" type="password" autocomplete="current-password" />
      </label>
      <button type="submit">Open Sales Quote Tool</button>
    </form>

    <div id="status" class="status"></div>

    <div class="links">
      <a href="/demo">Back to Demo Hub</a>
      <a href="/public-estimator">Public Intake</a>
    </div>
  </section>

  <script>
    const form = document.getElementById("login-form");
    const statusEl = document.getElementById("status");

    function setStatus(message, isError = false) {
      statusEl.textContent = message || "";
      statusEl.className = isError ? "status error" : "status";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("Signing in...");

      const payload = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value
      };

      try {
        const response = await fetch("/staff-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Could not sign in.");
        }
        window.location.href = data.redirect_url || "/staff-estimator";
      } catch (error) {
        setStatus(error.message || "Could not sign in.", true);
      }
    });
  </script>
</body>
</html>
