<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Communication First CRM</title>
  <link rel="stylesheet" href="/crm/static/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="inbox-pane" aria-label="Unified inbox">
      <header class="pane-header">
        <div>
          <p class="eyebrow">Communication First CRM</p>
          <h1>Inbox</h1>
        </div>
        <button id="seed" class="ghost-button" type="button">Demo Data</button>
      </header>
      <div id="conversations" class="conversation-list" aria-live="polite">
        <article class="empty-state">Loading conversations...</article>
      </div>
    </section>

    <section class="thread-pane" aria-label="Active conversation">
      <header class="thread-header">
        <div>
          <p id="thread-kicker" class="eyebrow">Select a conversation</p>
          <h2 id="thread-title">Conversation</h2>
        </div>
        <div id="thread-meta" class="thread-meta"></div>
      </header>

      <div id="thread" class="thread" aria-live="polite">
        <article class="empty-state">Choose a conversation to see the thread.</article>
      </div>

      <div class="quick-actions" aria-label="Quick actions">
        <button type="button" data-action="send-text">Send Text</button>
        <button type="button" data-action="log-call">Log Call</button>
        <button type="button" data-action="follow-up">Create Follow-up</button>
        <button type="button" data-action="quote">Create Quote</button>
      </div>

      <form id="message-form" class="composer">
        <input name="body" autocomplete="off" placeholder="Type a text reply..." />
        <button type="submit">Send</button>
      </form>
    </section>

    <aside class="context-pane" aria-label="Contact and action panel">
      <header class="pane-header compact">
        <div>
          <p class="eyebrow">Context</p>
          <h2>Contact</h2>
        </div>
      </header>
      <div id="summary" class="summary" aria-live="polite">
        <article class="empty-state">Contact details appear here after selecting a conversation.</article>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="/crm/static/app.js"></script>
</body>
</html>
