<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Communication Hub</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/crm/static/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="inbox-pane" aria-label="Unified inbox">
      <header class="pane-header">
        <div>
          <p class="eyebrow">Communication Hub</p>
          <h1>Inbox</h1>
        </div>
      </header>
      <div class="search-wrap">
        <input id="conversation-search" type="search" autocomplete="off" placeholder="Search inbox" aria-label="Search conversations" />
      </div>
      <div id="conversations" class="conversation-list" aria-live="polite">
        <article class="empty-state">Loading conversations...</article>
      </div>
    </section>

    <section class="thread-pane" aria-label="Customer workspace">
      <header class="thread-header">
        <div>
          <p id="workspace-kicker" class="eyebrow">Select a customer</p>
          <h2 id="workspace-title">Conversation</h2>
        </div>
        <div id="workspace-meta" class="thread-meta"></div>
      </header>

      <div id="thread" class="thread" aria-live="polite">
        <article class="empty-state">Choose a conversation to see the thread.</article>
      </div>

      <div class="quick-actions" aria-label="Quick actions">
        <button id="draft-reply" type="button" data-action="draft-reply">Draft reply</button>
        <button id="simulate-message" type="button" data-action="simulate-incoming">Simulate incoming message</button>
      </div>

      <form id="message-form" class="composer">
        <input name="body" autocomplete="off" placeholder="Type a text reply..." />
        <button type="submit">Send</button>
      </form>
    </section>

    <aside class="context-pane" aria-label="Contact and action panel">
      <header class="pane-header compact">
        <div>
          <p class="eyebrow">Context</p>
          <h2>Now</h2>
        </div>
      </header>
      <div id="summary" class="summary" aria-live="polite">
        <article class="empty-state">Contact details appear here after selecting a conversation.</article>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="/crm/static/app.js"></script>
</body>
</html>
