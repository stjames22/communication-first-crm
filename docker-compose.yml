services:
  db:
    image: postgres:16-alpine
    container_name: communication-first-crm-db
    environment:
      POSTGRES_DB: communication_first_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - communication_first_crm_db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: communication-first-crm-api
    depends_on:
      - db
    environment:
      GS_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/communication_first_crm
      GS_API_KEY: communication-first-crm-test-key
      GS_CORS_ORIGINS: http://localhost:4174
      PORT: 4174
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GS_OPENAI_API_KEY: ${GS_OPENAI_API_KEY:-}
    ports:
      - "4174:4174"

volumes:
  communication_first_crm_db_data:
